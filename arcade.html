<m-group>

  <!-- Cabinet Body -->
  <m-cube width="1.2" height="2.2" depth="0.8" y="1.1" color="#1a1a2e"></m-cube>

  <!-- Screen Bezel -->
  <m-cube width="1.0" height="0.85" depth="0.05" y="1.75" z="0.43" color="#0f0f0f"></m-cube>

  <!-- Marquee -->
  <m-cube width="1.1" height="0.25" depth="0.3" y="2.4" z="0.25" color="#e8000d"></m-cube>
  <m-label content="ARCADE" y="2.4" z="0.42" width="1.0" height="0.2" font-size="48" color="#ffffff" alignment="center"></m-label>

  <!-- Control Panel -->
  <m-cube width="1.1" height="0.15" depth="0.5" y="0.95" z="0.15" rx="-20" color="#111122"></m-cube>
  <m-sphere radius="0.06" y="1.07" z="0.1" x="-0.2" color="#cc0000"></m-sphere>
  <m-sphere radius="0.045" y="1.07" z="0.05" x="0.15" color="#e8000d"></m-sphere>
  <m-sphere radius="0.045" y="1.07" z="0.05" x="0.28" color="#ffcc00"></m-sphere>

  <!-- Game Screen: preview image shown when idle -->
  <m-image
    id="screen-preview"
    src="https://jdunk4.github.io/Gamer/SMW%20-%20Kaizo%20Mario%20World%201.png"
    width="0.88"
    height="0.72"
    y="1.75"
    z="0.46">
  </m-image>

  <!-- Game Frame: loads game.html on press E (hidden until activated) -->
  <m-frame
    id="game-frame"
    src=""
    width="0.88"
    height="0.72"
    y="1.75"
    z="0.47"
    visible="false">
  </m-frame>

  <!-- Info Card: floats above cabinet on approach -->
  <m-image
    id="info-card"
    src="https://jdunk4.github.io/Gamer/kaizomarioworld1-info-card.png"
    width="1.2"
    height="0.8"
    y="3.1"
    z="0.0"
    visible="false">
  </m-image>

  <!-- Proximity probe: show info card when player within 3m -->
  <m-position-probe
    id="probe"
    range="3.0"
    onpositionenter="document.getElementById('info-card').setAttribute('visible','true')"
    onpositionleave="document.getElementById('info-card').setAttribute('visible','false'); closeGame()">
  </m-position-probe>

  <!-- Interaction: Press E logic -->
  <m-interaction
    prompt="Press E to Play"
    range="2.5"
    onactivate="toggleGame()">
  </m-interaction>

  <script>
    var gameActive = false;

    function toggleGame() {
      if (gameActive) {
        closeGame();
      } else {
        launchGame();
      }
    }

    function launchGame() {
      gameActive = true;
      var frame = document.getElementById('game-frame');
      var preview = document.getElementById('screen-preview');
      frame.setAttribute('src', 'https://jdunk4.github.io/Gamer/game.html');
      frame.setAttribute('visible', 'true');
      preview.setAttribute('visible', 'false');
    }

    function closeGame() {
      if (!gameActive) return;
      gameActive = false;
      var frame = document.getElementById('game-frame');
      var preview = document.getElementById('screen-preview');
      frame.setAttribute('src', '');
      frame.setAttribute('visible', 'false');
      preview.setAttribute('visible', 'true');
    }
  </script>

</m-group>
