<m-group>

  <!-- Cabinet Body -->
  <m-cube width="1.2" height="2.2" depth="0.8" y="1.1" color="#1a1a2e"></m-cube>

  <!-- Screen Bezel -->
  <m-cube width="1.0" height="0.85" depth="0.05" y="1.75" z="0.43" color="#0f0f0f"></m-cube>

  <!-- Marquee -->
  <m-cube width="1.1" height="0.25" depth="0.3" y="2.4" z="0.25" color="#e8000d"></m-cube>
  <m-label content="ARCADE" y="2.4" z="0.42" width="1.0" height="0.2" font-size="18" color="#ffffff" alignment="center"></m-label>

  <!-- Control Panel -->
  <m-cube width="1.1" height="0.15" depth="0.5" y="0.95" z="0.15" rx="-20" color="#111122"></m-cube>
  <m-sphere radius="0.06" y="1.07" z="0.1" x="-0.2" color="#cc0000"></m-sphere>
  <m-sphere radius="0.045" y="1.07" z="0.05" x="0.15" color="#e8000d"></m-sphere>
  <m-sphere radius="0.045" y="1.07" z="0.05" x="0.28" color="#ffcc00"></m-sphere>

  <!-- DEBUG label — remove once confirmed working -->
  <m-label id="debug-label" content="IDLE" y="2.8" z="0.5" width="1.0" height="0.15" font-size="14" color="#ffff00" alignment="center"></m-label>

  <!-- Game Screen preview (shown when idle) -->
  <m-image
    id="screen-preview"
    src="https://jdunk4.github.io/Gamer/SMW%20-%20Kaizo%20Mario%20World%201.png"
    width="0.88"
    height="0.72"
    y="1.75"
    z="0.46">
  </m-image>

  <!-- Anchor point — game-frame gets inserted here when launched -->
  <m-group id="screen-slot" y="1.75" z="0.47"></m-group>

  <!-- Info Card (shown on proximity) -->
  <m-image
    id="info-card"
    src="https://jdunk4.github.io/Gamer/KMW1%20-%20Info%20Card.png"
    width="1.2"
    height="0.8"
    y="3.1"
    z="0.0"
    visible="false">
  </m-image>

  <!-- Proximity probe -->
  <m-position-probe id="probe" range="3.0"></m-position-probe>

  <!-- Interaction trigger -->
  <m-interaction id="interact" prompt="Press E to Play" range="2.5"></m-interaction>

  <script>
    var gameActive = false;
    var frameEl = null;

    var interact = document.getElementById('interact');
    var probe = document.getElementById('probe');

    interact.addEventListener('interact', function() {
      document.getElementById('debug-label').setAttribute('content', 'FIRED ' + Date.now());
      toggleGame();
    });

    probe.addEventListener('positionenter', function() {
      document.getElementById('info-card').setAttribute('visible', 'true');
    });

    probe.addEventListener('positionleave', function() {
      document.getElementById('info-card').setAttribute('visible', 'false');
      closeGame();
    });

    function toggleGame() {
      if (gameActive) {
        closeGame();
      } else {
        launchGame();
      }
    }

    function launchGame() {
      gameActive = true;

      // Hide preview
      document.getElementById('screen-preview').setAttribute('visible', 'false');

      // Create and insert m-frame fresh into the DOM
      frameEl = document.createElement('m-frame');
      frameEl.setAttribute('id', 'game-frame');
      frameEl.setAttribute('src', 'https://jdunk4.github.io/Gamer/game.html');
      frameEl.setAttribute('width', '0.88');
      frameEl.setAttribute('height', '0.72');

      document.getElementById('screen-slot').appendChild(frameEl);
    }

    function closeGame() {
      if (!gameActive) return;
      gameActive = false;

      // Remove frame entirely from DOM — kills the emulator cleanly
      var slot = document.getElementById('screen-slot');
      if (frameEl && slot.contains(frameEl)) {
        slot.removeChild(frameEl);
      }
      frameEl = null;

      // Restore preview
      document.getElementById('screen-preview').setAttribute('visible', 'true');
    }
  </script>

</m-group>
